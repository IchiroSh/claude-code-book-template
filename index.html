<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブロック崩し</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 6px;
      color: #e94560;
      margin-bottom: 12px;
    }

    #hud {
      display: flex;
      gap: 48px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    #hud span b {
      color: #4a90e2;
    }

    canvas {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 4px;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
    }

    #overlay-msg {
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #restart-btn {
      padding: 8px 30px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      letter-spacing: 2px;
      cursor: pointer;
      pointer-events: all;
      display: none;
    }

    #restart-btn:hover { background: #c73652; }

    #hint {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>BREAKOUT</h1>

  <div id="hud">
    <span>SCORE <b id="score">0</b></span>
    <span>LIVES <b id="lives">3</b></span>
    <span>LEVEL <b id="level">1</b></span>
  </div>

  <div style="position:relative;">
    <canvas id="canvas" width="480" height="420"></canvas>
    <div id="overlay">
      <div id="overlay-msg"></div>
      <button id="restart-btn" onclick="game.restart()">もう一度</button>
    </div>
  </div>

  <p id="hint">← → キー または マウスでパドルを操作 ／ スペース・クリックで発射</p>

  <script src="main.js"></script>
</body>
</html>
